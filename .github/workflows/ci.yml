name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[http,matchers,dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/tripwire/ --strict

  test:
    uses: ./.github/workflows/test.yml
