site_name: bigfoot
site_description: A pluggable interaction auditor for Python tests
site_url: https://axiomantic.github.io/bigfoot/
repo_url: https://github.com/axiomantic/bigfoot
repo_name: axiomantic/bigfoot

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guides/installation.md
    - Quick Start: guides/quickstart.md
  - Guides:
    - MockPlugin: guides/mock-plugin.md
    - HttpPlugin: guides/http-plugin.md
    - SubprocessPlugin: guides/subprocess-plugin.md
    - Async Usage: guides/async.md
    - pytest Integration: guides/pytest-integration.md
    - Writing Plugins: guides/writing-plugins.md
  - API Reference:
    - Overview: reference/index.md
    - StrictVerifier: reference/verifier.md
    - MockPlugin: reference/mock-plugin.md
    - HttpPlugin: reference/http-plugin.md
    - SubprocessPlugin: reference/subprocess-plugin.md
    - Errors: reference/errors.md

extra:
  version:
    provider: mike
    default: latest
